<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 40px;
            background: #fff;
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #222;
            border-radius: 50%;
            background: #f5f5f5;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #eee;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #111;
        }

        /* Main layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 0;
            height: calc(100vh - 65px);
        }

        /* Map side */
        .map-side {
            position: relative;
            overflow: hidden;
            background: #1a2035;
        }

        .map-grid {
            position: absolute;
            inset: 0;
        }

        .road-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.07);
        }

        .road-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.07);
        }

        .block {
            position: absolute;
            background: #1e2d45;
            border-radius: 4px;
        }

        .route-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .courier-dot {
            position: absolute;
            top: 28%;
            left: 22%;
            width: 52px;
            height: 52px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            animation: bounce 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .dest-pin {
            position: absolute;
            bottom: 30%;
            right: 25%;
            z-index: 10;
        }

        .dest-pin svg {
            width: 44px;
            height: 44px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        .map-label {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            z-index: 10;
        }

        .mapbox-badge {
            position: absolute;
            bottom: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.92);
            padding: 5px 10px;
            border-radius: 6px;
            z-index: 10;
        }

        .mapbox-badge span {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        /* Info side */
        .info-side {
            background: #f8f8f8;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-left: 1px solid #eee;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.06);
        }

        /* Courier card */
        .courier-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .courier-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574, #c8956c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .courier-text h4 {
            font-size: 16px;
            font-weight: 700;
            color: #111;
        }

        .courier-text p {
            font-size: 13px;
            color: #aaa;
            margin-top: 3px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #fff5e6;
            transition: transform 0.2s, background 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.1);
            background: #ffecd0;
        }

        /* Status card */
        .status-card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            background: #f4f4f4;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .status-info {
            flex: 1;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-info h4 {
            font-size: 16px;
            font-weight: 700;
            color: #111;
        }

        .eta {
            font-size: 15px;
            font-weight: 700;
            color: #111;
        }

        .status-info p {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        .progress-bar {
            margin-top: 14px;
            height: 5px;
            background: #f0f0f0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, #ff9f0a, #ffb340);
            border-radius: 5px;
            animation: prog 3s ease-in-out infinite alternate;
        }

        @keyframes prog {
            from { width: 60%; }
            to { width: 74%; }
        }

        /* Order card */
        .order-card h3 {
            font-size: 13px;
            font-weight: 700;
            color: #111;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }

        .order-item:last-of-type {
            border-bottom: none;
        }

        .item-name {
            font-size: 15px;
            color: #222;
            font-weight: 500;
        }

        .item-qty {
            font-size: 13px;
            color: #bbb;
            margin-left: 6px;
        }

        .item-price {
            font-size: 15px;
            font-weight: 600;
            color: #222;
        }

        .order-total {
            display: flex;
            justify-content: flex-end;
            padding-top: 14px;
            border-top: 1px solid #eee;
            margin-top: 6px;
        }

        .total-text {
            font-size: 16px;
            font-weight: 700;
            color: #111;
        }

        /* Collect button */
        .collect-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff9f0a, #ff6b35);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(255, 159, 10, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .collect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 159, 10, 0.45);
        }

        .collect-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
